    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 40px 20px;
      color: #1e293b;
    }

    h1.page-title {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 48px;
      background: linear-gradient(90deg, #6d28d9, #2563eb, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cards-container {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      animation: fadeUp 0.5s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.25s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #f1f5f9;
    }
    .card:nth-child(1) .card-header { background: linear-gradient(135deg, #ede9fe, #dbeafe); }
    .card:nth-child(2) .card-header { background: linear-gradient(135deg, #ccfbf1, #dbeafe); }

    .card-num {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; flex-shrink: 0;
      color: #ffffff;
    }
    .card:nth-child(1) .card-num { background: #7c3aed; }
    .card:nth-child(2) .card-num { background: #0d9488; }

    .card-meta { flex: 1; }
    .card-meta h2 { font-size: 0.95rem; font-weight: 600; color: #0f172a; margin-bottom: 6px; }

      font-size: 0.85rem;
      font-weight: 700;
      background: #dcfce7;
      border: 1px solid #86efac;

      align-items: flex-end;

      color: #94a3b8;

      border-radius: 18px 4px 18px 18px;

      font-size: 0.96rem;

    .bubble-ai p  { margin-bottom: 8px; }
    .bubble-ai ul, .bubble-ai ol { padding-left: 20px; margin-bottom: 8px; }

    .bubble-ai blockquote {
      border-left: 3px solid #818cf8;

    .bubble-ai hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
    .bubble-ai table {

    .bubble-ai th, .bubble-ai td {
      border: 1px solid #e2e8f0; padding: 6px 12px; text-align: left;

        "value": "## 第一步：弄清问题（破题与分析）\n\n### 1. 题型识别\n- **题型**：统计学基础应用题 / 线性回归分析。\n- **核心考点**：线性回归方程的物理意义、利用回归方程进行数值预测（点估计）。\n\n### 2. 知识点关联\n要解决此问题，需要牢固掌握以下知识点：\n1.  **变量识别与定义**：明确自变量 $x$ 代表"平均每天工作时间"，因变量 $y$ 代表"人均年收入"，这是代入计算的前提。\n2.  **线性回归方程 ($\\hat y = \\hat b x + \\hat a$)**：理解这是一个用于描述变量间线性关系的数学模型，本题中为 $\\hat y=12x+60$。\n3.  **回归预测的本质**：利用已知的回归方程，将新的 $x$ 值代入，求出的 $\\hat y$ 是 $y$ 的**估计值**或预测值，而非绝对准确的实际值。\n4.  **单位换算与敏感度**：注意 $y$ 的单位是"千元"，在解题和选选项时需保持单位一致。\n\n### 3. 破题思路/切入点\n- **目标**：求解自由职业者每天工作 5 小时的年收入估计值。\n- **逆向推导逻辑**：\n  求年收入估计值 ($\\hat y$) $\\rightarrow$ 需要找到 $y$ 与 $x$ 的数量关系 $\\rightarrow$ 题目已给出线性回归方程 $\\hat y=12x+60$ $\\rightarrow$ 确定此时的自变量 $x$ 是多少 $\\rightarrow$ 题目给出"平均每天工作的时间为 5 小时" $\\rightarrow$ 令 $x=5$ 代入方程计算。\n\n### 4. 易错点提示\n根据经验，学生在解答此类问题时最容易犯的错误：\n1.  **变量混淆**：没有仔细审题，错误地将 $x=5$ 当作 $y=5$ 代入，或者试图反解 $x$。虽然本题数字差异明显，但在复杂题目中容易出错。\n2.  **忽视"估计"二字**：虽然计算过程是代数运算，但在概念理解上，学生容易忘记求出的 $120$ 是一个统计学上的"平均趋势"或"预测值"，而非某个具体人的真实收入。\n3.  **单位陷阱**：题目单位是"千元"，选项有时会混合"元"和"千元"（例如选项出现 120000 元 和 120 元），学生容易看错数量级。\n4.  **运算失误**：在简单的 $12 \\times 5 + 60$ 运算中，先加后乘（$(5+60)\\times 12$）或者单纯的心算错误。\n\n---\n\n## 第二步：详细解题过程\n\n### 解题步骤\n\n#### 步骤 1：提取关键信息并对应变量\n- **步骤目标**：明确已知条件中数值对应的数学变量。\n- **思路**：（为了确保数值代入公式的正确性，必须先建立文字语言到数学符号的映射。）\n- **推导过程**：\n  根据题意：\n  - 自变量 $x$ = 平均每天工作时间（小时）\n  - 因变量 $y$ = 人均年收入（千元）\n  - 回归方程：$\\hat y = 12x + 60$\n  - 题目给定条件："平均每天工作的时间为 5 小时" $\\Rightarrow$ 即 $x = 5$。\n\n#### 步骤 2：代入回归方程进行计算\n- **步骤目标**：计算 $x=5$ 时的年收入估计值。\n- **思路**：（回归方程的作用即为预测。将已知自变量的值代入方程，即可得到因变量的估计值。）\n- **推导过程**：\n  将 $x = 5$ 代入方程 $\\hat y = 12x + 60$ 中：\n  $$ \\hat y = 12 \\times 5 + 60 $$\n  $$ \\hat y = 60 + 60 $$\n  $$ \\hat y = 120 $$\n\n#### 步骤 3：结合单位得出结论\n- **步骤目标**：匹配计算结果与选项。\n- **思路**：（检查计算结果的单位是否与题目和选项一致，避免数量级错误。）\n- **推导过程**：\n  计算结果为 120，题目中 $y$ 的单位为"千元"。\n  因此，估计该自由职业者年收入为 120 千元。\n  对比选项：\n  A. 50 千元\n  B. 60 千元\n  C. 120 千元\n  D. 72 千元\n  结果与 C 选项吻合。\n\n### 最终结论\n\\boxed{C}"
      }

    "id": "144dc90d-f0c2-4b40-b310-4b199002d0f9",

      },
      {
        "from": "gpt",
        "value": "## 第一步：弄清问题（破题与分析）\n\n### 1. 题型识别\n- **题型**：本题属于**指数与对数综合运算**题型。\n- **核心考点**：主要考察对数换底公式、对数基本恒等式以及指数幂的负指数性质。\n\n### 2. 知识点关联\n要解决此问题，需要牢固掌握以下知识点：\n1.  **对数的定义与基本变换**：已知 $A \\cdot B = 1$，则 $A$ 与 $B$ 互为倒数，即 $x = \\frac{1}{\\log_3 2}$。\n2.  **换底公式（倒数关系）**：$\\log_a b = \\frac{1}{\\log_b a}$。在本题中，用于将 $\\frac{1}{\\log_3 2}$ 转化为 $\\log_2 3$，这是解题的关键一步，目的是统一底数。\n3.  **对数基本恒等式**：$a^{\\log_a N} = N$。这是化简 $2^{\\log_2 3}$ 的核心公式，直接消去指数和对数符号。\n4.  **负指数幂运算**：$a^{-n} = \\frac{1}{a^n}$。用于将 $2^{-x}$ 转化为 $\\frac{1}{2^x}$ 进行计算。\n\n### 3. 破题思路/切入点\n- **目标**：求 $2^x + 2^{-x}$ 的值\n- **逆向推导逻辑**：\n  要求 $2^x + 2^{-x}$ $\\rightarrow$ 需要先求出 $2^x$ 的值 $\\rightarrow$ 观察底数为2，指数为 $x$，故需要将 $x$ 表示为以2为底的对数 $\\rightarrow$ 回到已知条件 $x \\log_3 2 = 1$ $\\rightarrow$ 得到 $x = \\frac{1}{\\log_3 2}$ $\\rightarrow$ 利用换底公式变形为 $x = \\log_2 3$。\n\n### 4. 易错点提示\n根据经验，学生在解答此类问题时最容易犯的错误：\n1.  **公式记忆混淆**：不能熟练运用 $\\frac{1}{\\log_a b} = \\log_b a$，导致 $x$ 一直保留在 $\\frac{1}{\\log_3 2}$ 的形式，无法与底数2进行化简。\n2.  **恒等式运用生疏**：算出 $x = \\log_2 3$ 后，不知道 $2^{\\log_2 3}$ 等于多少，或者错误地计算为 $2 \\times 3 = 6$ 或其他数值。\n3.  **运算符号错误**：在计算 $2^{-x}$ 时，误以为是 $-2^x$（即 $-3$），而忽略了负指数代表倒数的含义（应为 $\\frac{1}{3}$）。\n4.  **通分计算失误**：最后一步 $3 + \\frac{1}{3}$ 简单的分数加法，虽简单但容易因粗心算错。\n\n---\n\n## 第二步：详细解题过程\n\n### 解题步骤\n\n**步骤1：利用已知条件解出 $x$ 并进行换底变形**\n- **思路**：（已知乘积为1，先求出 $x$ 的表达式。为了后续能利用 $2^x$ 进行化简，必须根据"同底数"原则，利用换底公式的推论将对数的底数变为2。）\n- **推导过程**：\n  由已知条件 $x \\log_3 2 = 1$，得：\n  $$x = \\frac{1}{\\log_3 2}$$\n  利用换底公式 $\\frac{1}{\\log_a b} = \\log_b a$，得：\n  $$x = \\log_2 3$$\n\n**步骤2：计算 $2^x$ 的值**\n- **思路**：（将变形后的 $x$ 代入指数式。利用对数恒等式 $a^{\\log_a N} = N$ 直接化简。）\n- **推导过程**：\n  $$2^x = 2^{\\log_2 3}$$\n  根据对数恒等式，底数相同（均为2），直接消去得：\n  $$2^x = 3$$\n\n**步骤3：计算 $2^{-x}$ 的值**\n- **思路**：（利用负指数幂的定义 $a^{-n} = \\frac{1}{a^n}$ 将其转化为倒数形式。）\n- **推导过程**：\n  $$2^{-x} = \\frac{1}{2^x}$$\n  将步骤2的结果代入：\n  $$2^{-x} = \\frac{1}{3}$$\n\n**步骤4：代入原式求和**\n- **思路**：（将前两步的结果相加，进行分数的加法运算。）\n- **推导过程**：\n  $$2^x + 2^{-x} = 3 + \\frac{1}{3}$$\n  通分计算：\n  $$= \\frac{9}{3} + \\frac{1}{3} = \\frac{10}{3}$$\n\n### 最终结论\n\\boxed{\\frac{10}{3}}"
      }
    ],
    "id": "bb326d15-ba61-4a6f-90db-cc71097c6d11",
    "quesType": "填空题",

<script>
const items = JSON.parse(document.getElementById('raw-data').textContent);

const colors = [
  { header: 'linear-gradient(135deg,#ede9fe,#dbeafe)', num: '#7c3aed' },
  { header: 'linear-gradient(135deg,#ccfbf1,#dbeafe)', num: '#0d9488' }
];

function renderAnswer(raw) {
  return raw.replace(/<[^>]+>/g, '').trim();
}

function render() {
  const container = document.getElementById('cards');
  items.forEach((item, idx) => {
    const human = item.conversations.find(c => c.from === 'human');
    const gpt   = item.conversations.find(c => c.from === 'gpt');
    const id    = 'sol-' + idx;
    const c     = colors[idx] || colors[0];

    const card = document.createElement('div');
    card.className = 'card';

    const gptHtml = gpt ? marked.parse(gpt.value) : '';

    card.innerHTML = `
      <div class="card-header" style="background:${c.header}">
        <div class="card-num" style="background:${c.num}">${idx + 1}</div>
        <div class="card-meta">
          <h2>第 ${idx + 1} 题</h2>
          <div class="badges">
            <span class="badge badge-type">${item.quesType}</span>
            <span class="badge badge-level">难度：${item.level}</span>
          </div>
        </div>
        <div class="answer-pill">答案：${renderAnswer(item.quesAnswer)}</div>
      </div>

      <div class="chat-area">

        <!-- User input bubble -->
        <div class="msg-row-user">
          <div class="msg-col msg-col-user">
            <span class="msg-label">用户输入</span>
            <div class="bubble-user">${human ? human.value : ''}</div>
          </div>
          <div class="avatar av-user">🧑‍🎓</div>
        </div>

        <!-- Model output bubble -->
        <div class="msg-row-ai">
          <div class="avatar av-ai">🤖</div>
          <div class="msg-col msg-col-ai" style="flex:1;min-width:0;">
            <span class="msg-label">解题模型</span>
            <div class="bubble-ai" id="${id}">${gptHtml}</div>
          </div>
        </div>

        <!-- Toggle button -->
        <div class="toggle-wrap">
          <button class="toggle-btn" onclick="toggle('${id}',this)">
            <span class="arrow">&#9660;</span>&nbsp;收起解析
          </button>
        </div>

      </div>
    `;
    container.appendChild(card);
  });

  if (window.MathJax) MathJax.typesetPromise();
}

function toggle(id, btn) {
  const box = document.getElementById(id);
  const isCollapsed = btn.classList.toggle('collapsed');
  if (isCollapsed) {
    box.style.maxHeight = '0';
    box.style.overflow  = 'hidden';
    box.style.padding   = '0 22px';
    btn.innerHTML = '<span class="arrow" style="transform:rotate(-90deg);display:inline-block">&#9660;</span>&nbsp;展开解析';
  } else {
    box.style.maxHeight = '560px';
    box.style.overflow  = 'auto';
    box.style.padding   = '18px 22px';
    btn.innerHTML = '<span class="arrow" style="display:inline-block">&#9660;</span>&nbsp;收起解析';
  }
}

render();
